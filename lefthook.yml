assert_lefthook_installed: true
glob_matcher: doublestar
no_tty: true
skip_lfs: true

output:
  - summary
  - failure
  - execution
  - execution_out

pre-commit:
  piped: true

  commands:
    lint:
      run: make lint
      stage_fixed: true
    gitleaks:
      run: gitleaks git --pre-commit --staged --redact --no-banner --verbose

  skip:
    - merge: true
    - rebase: true
