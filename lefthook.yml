assert_lefthook_installed: true
glob_matcher: doublestar
no_tty: true
skip_lfs: true

output:
  - summary
  - failure
  - execution
  - execution_out

pre-commit:
  piped: true

  commands:
    generate:
      run: make generate && git add setup.sh
      glob: "scripts/{place-template-files,sync-actions-settings}.sh"
    lint:
      run: make lint
    betterleaks:
      run: betterleaks git --pre-commit --staged --redact --no-banner --verbose

  skip:
    - merge: true
    - rebase: true
