name: Setup Task
description: Install go-task/task with caching

inputs:
  version:
    description: Task version to install
    required: false

runs:
  using: composite
  steps:
    - name: Set task version
      id: version
      env:
        TASK_VERSION: v3.49.0
        INPUT_VERSION: ${{ inputs.version }}
      run: echo "value=${INPUT_VERSION:-$TASK_VERSION}" >> "$GITHUB_OUTPUT"
      shell: bash

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      id: cache
      with:
        path: /usr/local/bin/task
        key: task-${{ steps.version.outputs.value }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install task
      if: steps.cache.outputs.cache-hit != 'true'
      env:
        TASK_VERSION: ${{ steps.version.outputs.value }}
      run: |
        curl -fsSL --proto '=https' --tlsv1.2 \
          "https://raw.githubusercontent.com/go-task/task/refs/tags/${TASK_VERSION}/install-task.sh" \
          | bash -s -- -b /usr/local/bin "${TASK_VERSION}"
      shell: bash
