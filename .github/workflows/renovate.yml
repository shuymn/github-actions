name: Renovate config validation

on:
  workflow_call:
    inputs:
      files:
        description: Space-separated list of Renovate config files to validate
        type: string
        default: .github/renovate.json

jobs:
  validate:
    permissions:
      contents: read
    env:
      RENOVATE_VERSION: "43.125.1"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-renovate-${{ env.RENOVATE_VERSION }}-${{ runner.os }}

      - name: Validate Renovate config
        env:
          FILES: ${{ inputs.files }}
        run: |
          read -ra config_files <<< "$FILES"
          bunx --package=renovate@"${RENOVATE_VERSION:?}" renovate-config-validator --strict "${config_files[@]}"
        shell: bash
