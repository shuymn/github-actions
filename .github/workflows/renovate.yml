name: Renovate config validation

on:
  workflow_call:
    inputs:
      files:
        description: Space-separated list of Renovate config files to validate
        type: string
        default: .github/renovate.json

jobs:
  validate:
    permissions:
      contents: read
    env:
      RENOVATE_VERSION: "43.252.1"
      BUN_CONFIG_REGISTRY: "https://npm.flatt.tech/"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-renovate-${{ env.RENOVATE_VERSION }}-${{ runner.os }}

      - name: Validate Renovate config
        env:
          FILES: ${{ inputs.files }}
        run: |
          read -ra config_files <<< "$FILES"
          bunx --package=renovate@"${RENOVATE_VERSION:?}" renovate-config-validator --strict "${config_files[@]}"
        shell: bash
