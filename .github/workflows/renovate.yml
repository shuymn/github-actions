name: Renovate config validation

on:
  workflow_call:
    inputs:
      files:
        description: Space-separated list of Renovate config files to validate
        type: string
        default: default.json .github/renovate.json

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Validate Renovate config
        env:
          FILES: ${{ inputs.files }}
        run: |
          read -ra config_files <<< "$FILES"
          bunx --package=renovate renovate-config-validator --strict "${config_files[@]}"
        shell: bash
