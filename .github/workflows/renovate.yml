name: Renovate config validation

on:
  workflow_call:
    inputs:
      files:
        description: Space-separated list of Renovate config files to validate
        type: string
        default: .github/renovate.json

jobs:
  validate:
    permissions:
      contents: read
    env:
      RENOVATE_VERSION: "43.56.0"
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.bun/install/cache
          key: bun-renovate-${{ env.RENOVATE_VERSION }}-${{ runner.os }}

      - name: Validate Renovate config
        env:
          FILES: ${{ inputs.files }}
        run: |
          read -ra config_files <<< "$FILES"
          bunx --package=renovate@"${RENOVATE_VERSION:?}" renovate-config-validator --strict "${config_files[@]}"
        shell: bash
