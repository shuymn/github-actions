name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: bin
          key: shell-linters-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Makefile') }}

      - name: Check generated setup.sh
        run: |
          make generate
          git diff --no-patch --exit-code setup.sh
        shell: bash

      - name: Run shell linters
        env:
          GH_TOKEN: ${{ github.token }}
        run: make lint-shfmt lint-shellcheck
        shell: bash

  gha:
    permissions:
      contents: read
    uses: ./.github/workflows/gha.yml

  renovate:
    permissions:
      contents: read
    uses: ./.github/workflows/renovate.yml
    with:
      files: default.json .github/renovate.json

  security:
    permissions:
      contents: read
    uses: ./.github/workflows/security.yml
